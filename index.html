<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Simulator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">
    <!-- Import Google Sans-Serif Pixel Font VT323 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=36">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="480" height="300"></canvas>
        
        <!-- Selection Screen -->
        <div id="menu-overlay" class="overlay">
            <h1>SELECT YOUR FISH</h1>
            <div class="fish-options">
                <button class="menu-btn selection-btn" data-fish="goldfish">GOLDFISH</button>
                <button class="menu-btn selection-btn" data-fish="neon">NEON TETRA</button>
                <button class="menu-btn selection-btn" data-fish="danio">ZEBRA DANIO</button>
                <button class="menu-btn selection-btn" data-fish="guppy">GUPPY FISH</button>
                <button class="menu-btn selection-btn" data-fish="platy">PLATY FISH</button>
                <button class="menu-btn selection-btn" data-fish="molly">SAILFIN MOLLY</button>
                <button class="menu-btn selection-btn" data-fish="betta">BETTA FISH</button>
                <button class="menu-btn selection-btn" data-fish="angelfish">ANGELFISH</button>
                <button class="menu-btn selection-btn" data-fish="discus">DISCUS FISH</button>
                <button class="menu-btn selection-btn" data-fish="oscar">OSCAR FISH</button>
                <button class="menu-btn selection-btn" data-fish="koi">KOI FISH</button>
                <button class="menu-btn selection-btn" data-fish="cory">CORY CATFISH</button>
                <button class="menu-btn selection-btn" data-fish="shrimp">GHOST SHRIMP</button>
                <button class="menu-btn selection-btn" data-fish="coralshrimp">CORAL SHRIMP</button>
                <button class="menu-btn selection-btn" data-fish="snail">AQUARIUM SNAIL</button>
                <button class="menu-btn selection-btn" data-fish="clownfish">CLOWNFISH</button>
                <button class="menu-btn selection-btn" data-fish="bluetang">BLUE TANG</button>
                <button class="menu-btn selection-btn" data-fish="yellowtang">YELLOW TANG</button>
                <button class="menu-btn selection-btn" data-fish="pufferfish">PUFFERFISH</button>
            </div>
            <button id="start-btn" class="menu-btn hidden">START GAME</button>
        </div>

        <!-- Add Fish Overlay -->
        <div id="add-fish-overlay" class="overlay hidden">
            <h1>ADD NEW CREATURE</h1>
            <div class="fish-options">
                <button class="add-fish-option menu-btn" data-fish="goldfish">GOLDFISH</button>
                <button class="add-fish-option menu-btn" data-fish="neon">NEON TETRA</button>
                <button class="add-fish-option menu-btn" data-fish="danio">ZEBRA DANIO</button>
                <button class="add-fish-option menu-btn" data-fish="guppy">GUPPY FISH</button>
                <button class="add-fish-option menu-btn" data-fish="platy">PLATY FISH</button>
                <button class="add-fish-option menu-btn" data-fish="molly">SAILFIN MOLLY</button>
                <button class="add-fish-option menu-btn" data-fish="betta">BETTA FISH</button>
                <button class="add-fish-option menu-btn" data-fish="angelfish">ANGELFISH</button>
                <button class="add-fish-option menu-btn" data-fish="discus">DISCUS FISH</button>
                <button class="add-fish-option menu-btn" data-fish="oscar">OSCAR FISH</button>
                <button class="add-fish-option menu-btn" data-fish="koi">KOI FISH</button>
                <button class="add-fish-option menu-btn" data-fish="cory">CORY CATFISH</button>
                <button class="add-fish-option menu-btn" data-fish="shrimp">GHOST SHRIMP</button>
                <button class="add-fish-option menu-btn" data-fish="coralshrimp">CORAL SHRIMP</button>
                <button class="add-fish-option menu-btn" data-fish="snail">AQUARIUM SNAIL</button>
                <button class="add-fish-option menu-btn" data-fish="clownfish">CLOWNFISH</button>
                <button class="add-fish-option menu-btn" data-fish="bluetang">BLUE TANG</button>
                <button class="add-fish-option menu-btn" data-fish="yellowtang">YELLOW TANG</button>
                <button class="add-fish-option menu-btn" data-fish="pufferfish">PUFFERFISH</button>
            </div>
            <button id="close-add-fish" class="menu-btn">CANCEL</button>
        </div>

        <!-- Add Plant Overlay -->
        <div id="add-plant-overlay" class="overlay hidden">
            <h1>ADD NEW PLANT</h1>
            <div class="fish-options">
                <button class="add-plant-option menu-btn" data-plant="seaweed">SEAWEED</button>
                <button class="add-plant-option menu-btn" data-plant="fern">FERN</button>
                <button class="add-plant-option menu-btn" data-plant="grass">GRASS</button>
                <button class="add-plant-option menu-btn" data-plant="kelp">KELP</button>
                <button class="add-plant-option menu-btn" data-plant="anemone">ANEMONE</button>
                <button class="add-plant-option menu-btn" data-plant="sword">AMAZON SWORD</button>
                <button class="add-plant-option menu-btn" data-plant="moss">JAVA MOSS</button>
                <button class="add-plant-option menu-btn" data-plant="hairgrass">HAIRGRASS</button>
                <button class="add-plant-option menu-btn" data-plant="floater">RED FLOATER</button>
            </div>
            <button id="close-add-plant" class="menu-btn">CANCEL</button>
        </div>

        <!-- Game UI -->
        <div id="game-ui" class="hidden">
            <button id="feed-btn" class="ui-btn">FEED</button>
            <button id="clean-btn" class="ui-btn">CLEAN</button>
            <button id="add-fish-btn" class="ui-btn">ADD ANIMAL</button>
            <button id="add-plant-btn" class="ui-btn">ADD PLANT</button>
            <button id="gravel-btn" class="ui-btn">GRAVEL</button>
            <button id="reset-btn" class="ui-btn">RESET</button>
        </div>

        <!-- Gravel Overlay -->
        <div id="gravel-overlay" class="overlay hidden">
            <h1>SELECT GRAVEL</h1>
            <div class="fish-options">
                <button class="gravel-option menu-btn" data-color="#887766">NATURAL</button>
                <button class="gravel-option menu-btn" data-color="#4466aa">BLUE</button>
                <button class="gravel-option menu-btn" data-color="#aa4488">PINK</button>
                <button class="gravel-option menu-btn" data-color="#eeeeee">WHITE</button>
            </div>
            <button id="close-gravel" class="menu-btn">CANCEL</button>
        </div>
    </div>
    <script src="script.js?v=37"></script>
</body>
</html>
